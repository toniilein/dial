# Foundry config — used ONLY for local contract testing (forge test against a
# local EVM). The app itself compiles DialRegistry.sol via solc-js (compile:evm)
# and never depends on Foundry at runtime.
[profile.default]
src = "contracts"
test = "test"
out = "forge-out"
cache_path = "forge-cache"
solc = "0.8.24"
optimizer = true
optimizer_runs = 200
